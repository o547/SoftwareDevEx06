<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plotter</title>

    <script src="https://cdn.jsdelivr.net/npm/@panzoom/panzoom/dist/panzoom.min.js"></script>

    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 10px 15px;
        background-color: #f5f5f5;
      }

      h1 {
        margin-bottom: 10px;
      }

      .controls {
        margin-bottom: 10px;
      }

      button {
        padding: 5px 12px;
        margin-right: 6px;
        cursor: pointer;
        border: none;
        background-color: #0078d7;
        color: white;
        border-radius: 5px;
        margin-top: 1px;
        margin-bottom: 1px;
      }

      button:hover {
        background-color: #005fa3;
      }

      .remove-btn{
        background-color: #d70000;
      }

      .remove-btn:hover{
        background-color: #a30000;
      }

      #viewer {
        width: 80vw;

        height: 55vh;
        width: 100vh;
        max-width: 95vw;

        overflow: hidden;
        position: relative;

        border: 1px solid #ccc;
        background-color: rgb(230, 230, 230);

        touch-action: none;
      }

      #canvas {
        cursor: crosshair;
        display: block;
        transform-origin: top left;
      }

      #status {
        margin-top: 5px;
        margin-bottom: 5px;
        font-size: 14px;
        color: #333;
      }

      th,
      td {
        width: 80px;
        height: 1.5rem;
        padding-left: 10px;
      }

      #log-table {
        border-collapse: collapse;
        text-align: left;
        padding: 10px;
        font-weight: 400;
        margin-top: 10px;
      }

      #edge-table {
        border-collapse: collapse;
        text-align: left;
        padding: 10px;
        font-weight: 400;
        margin-top: 10px;
      }

      .table-title {
        background-color: rgb(220, 220, 220);
        text-align: center;
      }

      .wide-column {
        width: 400px;
      }

      #log-table td:last-child,
      #edge-table td:last-child,
      #log-table th:last-child,
      #edge-table th:last-child {
        user-select: none;
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        text-align: center;
      }
    </style>
  </head>

  <body>
    <h2 style="margin: 8px 0">Plotter</h2>
    <div style="margin: 5px 0">
      クリック：プロット / シフトクリック：平行, 垂直にプロット /
      edgeを二個選ぶ：二点間に線を引く。
    </div>
    <div class="controls">
      <input type="file" id="imageInput" accept="image/*" />
      <button id="downloadBtn">画像をダウンロード</button>
    </div>

    <div id="status">座標: 未選択</div>

    <div id="viewer">
      <canvas id="canvas"></canvas>
    </div>

    <!-- <div>ログ</div> -->
    <!-- <textarea
      style="width: 80%; height: 200px"
      id="logArea"
    ></textarea> -->

    <table id="log-table" border="1">
      <tr class="table-title">
        <th class="wide-column">区画名</th>
        <th>X</th>
        <th>Y</th>
        <th style="width: 250px">操作</th>
      </tr>
    </table>

    <table id="edge-table" border="1">
      <tr class="table-title">
        <th class="wide-column">区画名1</th>
        <th class="wide-column">区画名2</th>
        <th>X1</th>
        <th>Y1</th>
        <th>X2</th>
        <th>Y2</th>
        <th style="width: 150px">操作</th>
      </tr>
    </table>

    <p><a href="/">トップ画面に戻る</a></p>

    <script>
      let edgeStartX = -1;
      let edgeStartY = -1;
      let edgeStartSectionName = "";
      function addEdge(button) {
        const tr = button.closest("tr");
        if (edgeStartX == -1) {
          edgeStartX = tr.querySelector(".x").textContent;
          edgeStartY = tr.querySelector(".y").textContent;
          edgeStartSectionName = tr.querySelector(".section-name").textContent;
        } else {
          const edgeEndX = tr.querySelector(".x").textContent;
          const edgeEndY = tr.querySelector(".y").textContent;
          const edgeEndSectionName =
            tr.querySelector(".section-name").textContent;
          if (edgeStartSectionName == "" || edgeEndSectionName == "") {
            alert("先に区画名を入力してください");
            edgeStartX = -1;
            edgeStartY = -1;
            edgeStartSectionName = "";
            return;
          }
          drawLine(edgeStartX, edgeStartY, edgeEndX, edgeEndY);
          addEdgeRow(
            edgeStartSectionName,
            edgeEndSectionName,
            edgeStartX,
            edgeStartY,
            edgeEndX,
            edgeEndY,
          );
          edgeStartX = -1;
          edgeStartY = -1;
          edgeStartSectionName = "";
        }
      }

      //removePointを呼び出す
      function callRemovePoint(button) {
        const tr = button.closest("tr");
        const x = tr.querySelector(".x").textContent;
        const y = tr.querySelector(".y").textContent;
        removePoint(x, y);
        tr.remove();
      }

      //表にノードを保存
      function addLogRow(x, y) {
        const table = document.getElementById("log-table");
        const titleRow = document.querySelector("#log-table .table-title");
        const tr = document.createElement("tr");
        tr.className = "table-body";
        tr.innerHTML = `
        <td class="section-name" contenteditable="true"></td>
        <td class="x">${x}</td>
        <td class="y">${y}</td>
        <td>
        <button onclick="callRemovePoint(this)" class="remove-btn">remove</button>
        <button onclick="addEdge(this)">edge</button>
        <button onclick="temporarilyEnlargePoint(this)">light up</button>
        </td>`;

        titleRow.insertAdjacentElement("afterend", tr);
      }

      //表にエッジを保存
      function addEdgeRow(sectionName1, sectionName2, x1, y1, x2, y2) {
        const table = document.getElementById("edge-table");
        const titleRow = document.querySelector("#edge-table .table-title");
        const tr = document.createElement("tr");
        tr.className = "table-body";
        tr.innerHTML = `
        <td class="section-name" contenteditable="true">${sectionName1}</td>
        <td class="section-name" contenteditable="true">${sectionName2}</td>
        <td>${x1}</td>
        <td>${y1}</td>
        <td>${x2}</td>
        <td>${y2}</td>
        <td><button onclick="callRemoveEdge(this)" remove-btn>remove</button>
        </td>`;

        titleRow.insertAdjacentElement("afterend", tr);
      }

      let temporaryEnlargedPoint = null;

      // 指定した点を次のredrawCanvas呼び出しまで大きくする関数
      function temporarilyEnlargePoint(button) {
        const tr = button.closest("tr");
        const x = tr.querySelector(".x").textContent;
        const y = tr.querySelector(".y").textContent;
        const pointX = Number(x);
        const pointY = Number(y);

        if (Number.isNaN(pointX) || Number.isNaN(pointY)) {
          return;
        }

        temporaryEnlargedPoint = { x: pointX, y: pointY };
        redrawCanvas();
      }

      // キャンバス全体の再描画を行う共通関数
      function redrawCanvas() {
        // if (!imageLoaded) return;

        // キャンバスのクリアと元画像の描画
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(currentImage, 0, 0);

        // 保存されているすべての線を描画
        for (const line of window.lines) {
          ctx.beginPath();
          ctx.moveTo(line.x1, line.y1);
          ctx.lineTo(line.x2, line.y2);
          ctx.strokeStyle = "rgba(255, 0, 0, 0.20)";
          ctx.lineWidth = 2; // 線の太さ
          ctx.stroke();
        }

        // 保存されているすべての点を描画
        for (const point of window.points) {
          const isTemporary =
            temporaryEnlargedPoint &&
            Number(point.x) == temporaryEnlargedPoint.x &&
            Number(point.y) == temporaryEnlargedPoint.y;

          ctx.beginPath();
          if (isTemporary) {
            ctx.arc(point.x, point.y, 5, 0, Math.PI * 2);
            ctx.fillStyle = "rgba(0, 255, 0, 0.50)";
          } else {
            ctx.arc(point.x, point.y, 2, 0, Math.PI * 2);
            ctx.fillStyle = "rgba(0, 0, 0, 0.20)";
          }
          ctx.fill();
        }

        temporaryEnlargedPoint = null;
      }

      // 指定された座標 (x, y) に一致する点を削除する関数
      function removePoint(x, y) {
        // 座標が一致しない点だけを残す（＝一致する点を削除）
        window.points = window.points.filter(
          (point) => !(point.x == x && point.y == y),
        );

        for(const line of window.lines){
          if(x == line.x1 && y == line.y1 || x == line.x2 && y == line.y2){
            removeEdge(line.x1, line.y1, line.x2, line.y2);
          }
        }

        // 画面を再描画
        redrawCanvas();
      }

      // 指定された座標間に線を引く関数
      function drawLine(x1, y1, x2, y2) {
        // 配列に線のデータを保存
        window.lines.push({ x1, y1, x2, y2 });

        // 画面を再描画
        redrawCanvas();
      }

      function removeEdgeRow(x1, y1, x2, y2) {
        const edgeRows = document.querySelectorAll("#edge-table .table-body");

        for (const tr of edgeRows) {
          const cells = tr.children;
          const rowX1 = cells[2] ? cells[2].textContent.trim() : "";
          const rowY1 = cells[3] ? cells[3].textContent.trim() : "";
          const rowX2 = cells[4] ? cells[4].textContent.trim() : "";
          const rowY2 = cells[5] ? cells[5].textContent.trim() : "";

          if (
            Number(rowX1) == Number(x1) &&
            Number(rowY1) == Number(y1) &&
            Number(rowX2) == Number(x2) &&
            Number(rowY2) == Number(y2)
          ) {
            tr.remove();
            return;
          }
        }
      }

      // 指定された座標に一致するエッジ（線）を削除する関数
      function removeEdge(x1, y1, x2, y2) {
        // 数値として比較して削除（文字列でも動作するように Number() を使用）
        window.lines = window.lines.filter((line) => {
          return !(
            Number(line.x1) == Number(x1) &&
            Number(line.y1) == Number(y1) &&
            Number(line.x2) == Number(x2) &&
            Number(line.y2) == Number(y2)
          );
        });
        removeEdgeRow(x1, y1, x2, y2);

        // 再描画
        redrawCanvas();
      }

      // エッジテーブルの行から呼び出される削除ハンドラ
      function callRemoveEdge(button) {
        const tr = button.closest("tr");
        if (!tr) return;

        // テーブル列の構成に合わせて座標を取得
        const cells = tr.children;
        const x1 = cells[2] ? cells[2].textContent.trim() : "";
        const y1 = cells[3] ? cells[3].textContent.trim() : "";
        const x2 = cells[4] ? cells[4].textContent.trim() : "";
        const y2 = cells[5] ? cells[5].textContent.trim() : "";

        if (x1 !== "" && y1 !== "" && x2 !== "" && y2 !== "") {
          removeEdge(x1, y1, x2, y2);
        }

        // tr.remove();
      }

      const imageInput = document.getElementById("imageInput");
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");

      const viewer = document.getElementById("viewer");
      const downloadBtn = document.getElementById("downloadBtn");
      const statusText = document.getElementById("status");
      const logTextArea = document.getElementById("logArea");

      let currentImage = new Image();
      let imageLoaded = false;

      let lastX = -1;
      let lastY = -1;
      let isDragging = false;
      let dragStartX = 0;
      let dragStartY = 0;

      window.points = [];
      window.lines = [];
      temporaryEnlargedPoint = null;

      //Panzoom初期化
      const panzoom = Panzoom(canvas, {
        minScale: 0.02,
        maxScale: 20,

        contain: null,
      });

      // ホイールズーム対応
      viewer.addEventListener("wheel", panzoom.zoomWithWheel);

      canvas.addEventListener("pointerdown", (event) => {
        if (event.pointerType === "mouse" && event.button !== 0) {
          return;
        }
        dragStartX = event.clientX;
        dragStartY = event.clientY;
        isDragging = false;
      });

      canvas.addEventListener("pointermove", (event) => {
        if (event.pressure === 0) {
          return;
        }
        const moveX = Math.abs(event.clientX - dragStartX);
        const moveY = Math.abs(event.clientY - dragStartY);
        if (moveX > 5 || moveY > 5) {
          isDragging = true;
        }
      });

      canvas.addEventListener("pointerup", () => {
        setTimeout(() => {
          isDragging = false;
        }, 0);
      });

      imageInput.addEventListener("change", (event) => {
        const file = event.target.files[0];

        if (!file) {
          return;
        }

        const reader = new FileReader();

        reader.onload = (e) => {
          currentImage.onload = () => {
            canvas.width = currentImage.width;
            canvas.height = currentImage.height;

            window.points = [];
            window.lines = [];

            edgeStartX = -1;
            edgeStartY = -1;

            redrawCanvas();
            imageLoaded = true;

            const tableBodys = document.querySelectorAll(".table-body");
            for (const tableBody of tableBodys) {
              tableBody.remove();
            }

            // 読み込み時にズームリセット
            panzoom.reset();
          };

          currentImage.src = e.target.result;
        };

        reader.readAsDataURL(file);
      });

      canvas.addEventListener("click", async (event) => {
        if (!imageLoaded) {
          return;
        }

        if (isDragging) {
          return;
        }

        // transform後の位置取得
        const rect = canvas.getBoundingClientRect();

        // 現在のPanzoom状態取得
        const scale = panzoom.getScale();

        // transform後座標 → 元画像座標へ変換
        let x = Math.round((event.clientX - rect.left) / scale);

        let y = Math.round((event.clientY - rect.top) / scale);

        if (event.shiftKey) {
          //シフトを押しながらのクリックでないと、
          //最も近い座標の、x,y座標のどちらか近い方を合わせる
          const nearestPoint = snapToNearestPoint(x, y);
          nearestX = nearestPoint.x;
          nearestY = nearestPoint.y;
          console.log(x, y, nearestX, nearestY);
          if (Math.abs(nearestX - x) < Math.abs(nearestY - y)) {
            x = nearestX;
          } else {
            y = nearestY;
          }
        }

        window.points.push({ x, y });
        // temporarilyEnlargePoint(x, y);
        redrawCanvas();

        // 座標をクリップボードへコピー
        const text = `${x}\t${y}`;

        try {
            await navigator.clipboard.writeText(text);
            statusText.textContent = `座標: ${text} （クリップボードへコピー済み）`;
        }
        catch (error) {
            statusText.textContent = `座標: ${text} （コピー失敗）`;
        }

        addLogRow(x, y);

        lastX = x;
        lastY = y;
      });

      downloadBtn.addEventListener("click", () => {
        if (!imageLoaded) {
          alert("先に画像をアップロードしてください");
          return;
        }

        const link = document.createElement("a");

        link.download = "marked_image.png";

        link.href = canvas.toDataURL("image/png");

        link.click();
      });

      function snapToNearestPoint(x, y) {
        if (!window.points.length) {
          return { x, y };
        }

        let nearestPoint = window.points[0];
        let nearestDistance = Math.hypot(
          x - nearestPoint.x,
          y - nearestPoint.y,
        );

        for (const point of window.points.slice(1)) {
          const distance = Math.hypot(x - point.x, y - point.y);

          if (distance < nearestDistance) {
            nearestPoint = point;
            nearestDistance = distance;
          }
        }

        return { x: nearestPoint.x, y: nearestPoint.y };
      }
    </script>
  </body>
</html>
