<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>画像座標取得</title>

    <!-- 変更: Panzoomライブラリ追加 -->
    <script src="https://cdn.jsdelivr.net/npm/@panzoom/panzoom/dist/panzoom.min.js"></script>

    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 20px;
        background-color: #f5f5f5;
      }

      h1 {
        margin-bottom: 10px;
      }

      .controls {
        margin-bottom: 10px;
      }

      button {
        padding: 5px 12px;
        margin-right: 10px;
        cursor: pointer;
        border: none;
        background-color: #0078d7;
        color: white;
        border-radius: 5px;
      }

      button:hover {
        background-color: #005fa3;
      }

      /* 変更: viewer追加 */
      #viewer {
        width: 80vw;
        height: 60vh;

        overflow: hidden;
        position: relative;

        border: 1px solid #ccc;
        background-color: rgb(230, 230, 230);

        touch-action: none;
      }

      /* 変更: canvasのmax-width削除 */
      #canvas {
        cursor: crosshair;
        display: block;

        transform-origin: top left;
      }

      #status {
        margin-top: 5px;
        margin-bottom: 5px;
        font-size: 14px;
        color: #333;
      }
    </style>
  </head>

  <body>
    <h2>画像座標取得</h2>
    <p>
      画像の任意の場所をクリックすると、そのx,y座標をコピーします
    </p>

    <div class="controls">
      <input type="file" id="imageInput" accept="image/*" />
      <button id="downloadBtn">画像をダウンロード</button>
    </div>

    <div id="status">座標: 未選択</div>

    <div id="viewer">
      <canvas id="canvas"></canvas>
    </div>

    <div>ログ</div>
    <textarea
      style="width: 80%; height: 200px"
      id="logArea"
    ></textarea>

    <p><a href="/">トップ画面に戻る</a></p>

    <script>
      const imageInput = document.getElementById("imageInput");
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");

      const viewer = document.getElementById("viewer");

      const downloadBtn = document.getElementById("downloadBtn");
      const statusText = document.getElementById("status");
      const logTextArea = document.getElementById("logArea");

      let currentImage = new Image();
      let imageLoaded = false;

      let lastX = -1;
      let lastY = -1;

      //Panzoom初期化
      const panzoom = Panzoom(canvas, {
        minScale: 0.02,
        maxScale: 20,

        contain: null,
      });

      // ホイールズーム対応
      viewer.addEventListener("wheel", panzoom.zoomWithWheel);

      imageInput.addEventListener("change", (event) => {
        const file = event.target.files[0];

        if (!file) {
          return;
        }

        const reader = new FileReader();

        reader.onload = (e) => {
          currentImage.onload = () => {
            canvas.width = currentImage.width;
            canvas.height = currentImage.height;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.drawImage(currentImage, 0, 0);

            imageLoaded = true;

            // 読み込み時にズームリセット
            panzoom.reset();
          };

          currentImage.src = e.target.result;
        };

        reader.readAsDataURL(file);
      });

      canvas.addEventListener("click", async (event) => {
        if (!imageLoaded) {
          return;
        }

        // transform後の位置取得
        const rect = canvas.getBoundingClientRect();

        // 現在のPanzoom状態取得
        const scale = panzoom.getScale();

        // transform後座標 → 元画像座標へ変換
        let x = Math.round(
          (event.clientX - rect.left) / scale
        );

        let y = Math.round(
          (event.clientY - rect.top) / scale
        );

        if (event.shiftKey) {
          //シフトを押しながらクリックされると
          //前回の座標とx,y座標のどちらか近い方を合わせる

          if (lastX != -1) {
            if (
              Math.abs(lastX - x) <
              Math.abs(lastY - y)
            ) {
              x = lastX;
            } else {
              y = lastY;
            }
          }
        }

        // 点描画前に画像再描画
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.drawImage(currentImage, 0, 0);

        // 既存点保持用配列
        if (!window.points) {
          window.points = [];
        }

        window.points.push({ x, y });

        // 全点再描画
        for (const point of window.points) {
          ctx.beginPath();

          ctx.arc(
            point.x,
            point.y,
            3,
            0,
            Math.PI * 2
          );

          ctx.fillStyle = "rgba(0, 0, 0, 0.20)";

          ctx.fill();
        }

        // 座標をクリップボードへコピー
        const text = `${x},${y}`;

        logTextArea.value += `${x},${y}\n`;

        lastX = x;
        lastY = y;

        try {
          await navigator.clipboard.writeText(text);

          statusText.textContent =
            `座標: ${text} （クリップボードへコピー済み）`;
        } catch (error) {
          statusText.textContent =
            `座標: ${text} （コピー失敗）`;
        }
      });

      downloadBtn.addEventListener("click", () => {
        if (!imageLoaded) {
          alert("先に画像をアップロードしてください");

          return;
        }

        const link = document.createElement("a");

        link.download = "marked_image.png";

        link.href = canvas.toDataURL("image/png");

        link.click();
      });
    </script>
  </body>
</html>
