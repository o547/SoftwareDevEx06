<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>画像座標取得</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 20px;
        background-color: #f5f5f5;
      }

      h1 {
        margin-bottom: 10px;
      }

      .controls {
        margin-bottom: 10px;
      }

      button {
        padding: 5px 12px;
        margin-right: 10px;
        cursor: pointer;
        border: none;
        background-color: #0078d7;
        color: white;
        border-radius: 5px;
      }

      button:hover {
        background-color: #005fa3;
      }

      #canvas {
        border: 1px solid #ccc;
        background-color: white;
        max-width: 80%;
        cursor: crosshair;
      }

      #status {
        margin-top: 5px;
        margin-bottom: 5px;
        font-size: 14px;
        color: #333;
      }
    </style>
  </head>
  <body>
    <h2>画像座標取得</h2>
    <p>画像の任意の場所をクリックすると、そのx,y座標をコピーします</p>

    <div class="controls">
      <input type="file" id="imageInput" accept="image/*" />
      <button id="downloadBtn">画像をダウンロード</button>
    </div>

    <div id="status">座標: 未選択</div>
    <canvas id="canvas"></canvas>
    <div>ログ</div>
    <textarea style="width: 80%; height: 200px;" id="logArea"></textarea>
    <p><a href="/">トップ画面に戻る</a></p>

    <script>
      const imageInput = document.getElementById("imageInput");
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");
      const downloadBtn = document.getElementById("downloadBtn");
      const statusText = document.getElementById("status");
      const logTextArea = document.getElementById("logArea");

      let currentImage = new Image();
      let imageLoaded = false;
      let lastX = -1;
      let lastY = -1;
      

      imageInput.addEventListener("change", (event) => {
        const file = event.target.files[0];

        if (!file) {
          return;
        }

        const reader = new FileReader();

        reader.onload = (e) => {
          currentImage.onload = () => {
            canvas.width = currentImage.width;
            canvas.height = currentImage.height;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(currentImage, 0, 0);

            imageLoaded = true;
          };

          currentImage.src = e.target.result;
        };

        reader.readAsDataURL(file);
      });

      canvas.addEventListener("click", async (event) => {
        if (!imageLoaded) {
          return;
        }

        const rect = canvas.getBoundingClientRect();

        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;

        let x = Math.round((event.clientX - rect.left) * scaleX);
        let y = Math.round((event.clientY - rect.top) * scaleY);


        if (event.shiftKey) {
          //シフトを押しながらクリックされると
          //前回の座標とx,y座標のどちらか近い方を合わせる
          if(lastX != -1){
            if(Math.abs(lastX - x) < Math.abs(lastY - y)){
              x = lastX;
            }else{
              y = lastY;
            }
          }
        }

        // 薄い赤色の点
        ctx.beginPath();
        ctx.arc(x, y, 3, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(0, 0, 0, 0.20)";
        ctx.fill();

        // 座標をクリップボードへコピー
        const text = `${x},${y}`;
        logTextArea.value  += `${x},${y}\n`

        lastX = x;
        lastY = y;

        try {
          await navigator.clipboard.writeText(text);
          statusText.textContent = `座標: ${text} （クリップボードへコピー済み）`;
        } catch (error) {
          statusText.textContent = `座標: ${text} （コピー失敗）`;
        }
      });

      downloadBtn.addEventListener("click", () => {
        if (!imageLoaded) {
          alert("先に画像をアップロードしてください");
          return;
        }

        const link = document.createElement("a");
        link.download = "marked_image.png";
        link.href = canvas.toDataURL("image/png");
        link.click();
      });
    </script>
  </body>
</html>

<!-- ---
## 機能

    * 画像をアップロード
    * 画像の任意位置をクリック
    * クリック座標をクリップボードへ自動コピー
    * クリック位置に薄い赤色の点を表示
    * 点を何個でも連続追加可能
    * 点を書き込んだ画像をダウンロード可能

## 使用方法

    1. 本ファイルをブラウザで起動
    2. 「画像を選択」から画像アップロード
    3. 画像をクリックすると座標コピー＆点追加
    4. 「画像をダウンロード」で保存

## カスタマイズ例

    ### 点を小さくする
    ctx.arc(x, y, 3, 0, Math.PI * 2);

    ### 点を青にする
    ctx.fillStyle = 'rgba(0, 0, 255, 0.35)';

    ### コピー形式を `(x,y)` にする
    const text = `(${x}, ${y})`;

-->
