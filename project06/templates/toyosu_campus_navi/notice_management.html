<!doctype html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>豊洲キャンパスナビ</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'toyosu_campus_navi/css/manage.css' %}">
  <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</head>

<body>
  {% csrf_token %}
  <div id="google_translate_element"></div>
  <div class="manage-app">
    <div class="manage-header">
      <h1>お知らせ管理</h1>
      <button class="manage-backbutton" onclick="location.href='/'">
        地図画面に戻る
      </button>
    </div>

    <div class="manage-container">
      <div class="manage-item">
        <div class="manage-title">記事タイトル1</div>

        <div class="manage-buttons">
          <button class="edit-button" onclick="location.href='/notice/edit'">
            <img src="{%static 'toyosu_campus_navi/image/pen.png' %}" class="icon">
            <span class="label">編集</span>
          </button>

          <button class="delete-button">
            <img src="{%static 'toyosu_campus_navi/image/bin.png' %}" class="icon">
            <span class="label">削除</span>
          </button>
        </div>
      </div>
      <div class="manage-item">
        <div class="manage-title">記事タイトル2</div>

        <div class="manage-buttons">
          <button class="edit-button" onclick="location.href='/notice/edit'">
            <img src="{%static 'toyosu_campus_navi/image/pen.png' %}" class="icon">
            <span class="label">編集</span>
          </button>

          <button class="delete-button">
            <img src="{%static 'toyosu_campus_navi/image/bin.png' %}" class="icon">
            <span class="label">削除</span>
          </button>
        </div>
      </div>

    </div>

    <div class="new-create-area">
      <button class="new-create-button" onclick="location.href='/notice/edit'">
        ＋ 新規作成
      </button>
    </div>
  </div>
</body>

{{ alert_message|json_script:"alert_message" }}
{{ username|json_script:"username" }}
{{ is_superuser|json_script:"is_superuser" }}
{{ language|json_script:"language" }}
{{ user_id|json_script:"user_id" }}


{% load static %}
<script src="{% static 'toyosu_campus_navi/js/notice_management.js' %}"></script>

</html>
