<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form method="POST",enctype="multipart/form-data">
        {% csrf_token %}
    <p>
    出発地点：
    <select name="form_start" id="form_start" onchange="this.form.submit()">
          <option value="">--選択してください--</option>
          {% for node in nodes %}
          <option value="{{node}}" {% if start == node %}selected{% endif %} >{{node}}</option>
          {% endfor %}
        </select>
    </p>
    目標地点：
    <select name="form_end" id="form_end" onchange="this.form.submit()">
          <option value="">--選択してください--</option>
          {% for node in nodes %}
          <option value="{{node}}" {% if end == node %}selected{% endif %} >{{node}}</option>
          {% endfor %}
    </select>
    </p>
    </form>
    
    <div class="message_area" style="height: 100px;">
    {% if shortest_path_string %}
    <h3>[{{start}}] から [{{end}}] のルート</h3>
    <p>{{shortest_path_string}}</p>
    {% else %}
    <p>出発地点と目標地点を選択してください</p>
    {% endif %}
    </div>
    
    {% load static %}
    <img src="{% static 'toyosu_campus_navi/image/' %}{{ map_image_file }}" style="width:1000px">





</body>
</html>
